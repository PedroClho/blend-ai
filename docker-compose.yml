# Blend AI — subir a interface:  docker compose up
#
# Usa `blend-ai:torch20` (torch 2.0 + cuda11.7 + NATTEN FORCE_CUDA + allin1 —
# validada 2026-06-12 com GPU e estrutura rotulada). Rebuild: docker compose build.
# Fallback sem allin1 (torch 2.6): blend-ai:torch26 / Dockerfile.torch26-fallback.
services:
  blend:
    image: blend-ai:torch20
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - blend-cache:/root/.cache   # modelos Demucs/torch — persistem entre runs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # UI oficial: SPA (web/dist, buildar com `cd web && npm run build`) servida
    # pelo FastAPI junto com a API de jobs. UI legada: streamlit run app/app.py.
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    # Shell:  docker compose run --rm blend bash

volumes:
  blend-cache:
