# Blend AI — subir a interface:  docker compose up
#
# Usa a imagem validada `blend-ai:torch26` (torch 2.6 + GPU RTX 2060, sem allin1).
# Quando a stack com allin1 (torch 2.0) for buildada a partir do Dockerfile,
# trocar para `image: blend-ai` e reativar `build: .`.
services:
  blend:
    image: blend-ai:torch26
    # build: .            # Dockerfile = stack torch 2.0 + allin1 (a buildar; ver Dockerfile)
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
      - blend-cache:/root/.cache   # modelos Demucs/torch — persistem entre runs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: streamlit run app/app.py --server.address=0.0.0.0 --server.port=8501
    # Shell:  docker compose run --rm blend bash

volumes:
  blend-cache:
